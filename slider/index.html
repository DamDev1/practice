    <link rel="stylesheet" href="style.css">

            </div>

            <div class="item">
                <img src="../img/john-towner-3Kv48NS4WUU-unsplash.jpg" alt="">
                <div class="caption">Item 2</div>
            </div>

            <div class="item">
                <img src="../img/john-tuesday-NqVPSzmcGLc-unsplash.jpg" alt="">
                <div class="caption">Item 3</div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>

</html>
