<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="coming.css">
    <title>Coming Soon</title>
</head>
<body>
    <div class="bgimg">
        <div class="topLeft">
            <p>Logo</p>
        </div>
        <div class="middle">
            <h1>COMING SOON</h1>
            <hr>
            <div class="countDown">
                <div class="days">
                    <h3 id="day">Time</h3>
                    <p>Days</p>
                </div>

                <div class="hours">
                    <h3 id="hours">Time</h3>
                    <p>Hours</p>
                </div>

                <div class="mins">
                    <h3 id="mins">Time</h3>
                    <p>Mins</p>
                </div>

                <div class="secs">
                    <h3 id="secs">Time</h3>
                    <p>Seconds</p>
                </div>

            </div>
        </div>
        <div class="bottomLeft">
            <p>Some text</p>
        </div>
    </div>

    <script src="coming.js"></script>
</body>
</html>
